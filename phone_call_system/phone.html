<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Phone Call Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

h1{
font-size:28px;
}

#clock{
font-size:18px;
font-weight:600;
}

.container{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
text-align:center;
backdrop-filter:blur(15px);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-top:10px;
color:#38bdf8;
}

.form-section{
display:grid;
grid-template-columns:1fr 2fr;
gap:20px;
}

.form-box,.table-box{
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
backdrop-filter:blur(15px);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
font-weight:600;
}

.add-btn{
background:#22c55e;
color:white;
}

.search{
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2563eb;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.2);
}

.delete-btn{
background:#ef4444;
color:white;
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.status-completed{
color:#22c55e;
font-weight:bold;
}

.status-missed{
color:#ef4444;
font-weight:bold;
}

.status-ongoing{
color:#f59e0b;
font-weight:bold;
}

@media(max-width:900px){
.form-section{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
<h1>📞 Phone Call Management System</h1>
<div id="clock"></div>
</header>

<div class="container">

<div class="cards">
<div class="card">
<h3>Total Calls</h3>
<h2 id="totalCalls">0</h2>
</div>

<div class="card">
<h3>Completed</h3>
<h2 id="completedCalls">0</h2>
</div>

<div class="card">
<h3>Missed</h3>
<h2 id="missedCalls">0</h2>
</div>

<div class="card">
<h3>Ongoing</h3>
<h2 id="ongoingCalls">0</h2>
</div>
</div>

<div class="form-section">

<div class="form-box">
<h2>Add New Call</h2>

<input type="text" id="callerName" placeholder="Caller Name">

<input type="text" id="phoneNumber" placeholder="Phone Number">

<select id="status">
<option value="Completed">Completed</option>
<option value="Missed">Missed</option>
<option value="Ongoing">Ongoing</option>
</select>

<button class="add-btn" onclick="addCall()">
Add Call
</button>
</div>

<div class="table-box">

<input type="text"
class="search"
id="search"
placeholder="Search Caller..."
onkeyup="searchCalls()">

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="callTable"></tbody>

</table>

</div>

</div>

</div>

<script>

let calls = JSON.parse(localStorage.getItem("calls")) || [];

function saveData(){
localStorage.setItem("calls",JSON.stringify(calls));
}

function addCall(){

let name=document.getElementById("callerName").value;
let phone=document.getElementById("phoneNumber").value;
let status=document.getElementById("status").value;

if(name==="" || phone===""){
alert("Please enter all fields");
return;
}

let call={
id:Date.now(),
name:name,
phone:phone,
status:status
};

calls.push(call);

saveData();
displayCalls();

document.getElementById("callerName").value="";
document.getElementById("phoneNumber").value="";
}

function displayCalls(){

let table=document.getElementById("callTable");

table.innerHTML="";

let completed=0;
let missed=0;
let ongoing=0;

calls.forEach((call,index)=>{

if(call.status==="Completed") completed++;
if(call.status==="Missed") missed++;
if(call.status==="Ongoing") ongoing++;

let row=`
<tr>
<td>${call.id}</td>
<td>${call.name}</td>
<td>${call.phone}</td>
<td class="status-${call.status.toLowerCase()}">
${call.status}
</td>
<td>
<button class="delete-btn"
onclick="deleteCall(${index})">
Delete
</button>
</td>
</tr>
`;

table.innerHTML+=row;

});

document.getElementById("totalCalls").innerText=calls.length;
document.getElementById("completedCalls").innerText=completed;
document.getElementById("missedCalls").innerText=missed;
document.getElementById("ongoingCalls").innerText=ongoing;
}

function deleteCall(index){

if(confirm("Delete this call?")){
calls.splice(index,1);
saveData();
displayCalls();
}
}

function searchCalls(){

let filter=document.getElementById("search").value.toUpperCase();

let rows=document.querySelectorAll("#callTable tr");

rows.forEach(row=>{

let name=row.cells[1].innerText.toUpperCase();

row.style.display=name.includes(filter)
? ""
: "none";

});
}

function updateClock(){
let now=new Date();
document.getElementById("clock").innerHTML=
now.toLocaleString();
}

setInterval(updateClock,1000);

displayCalls();
updateClock();

</script>

</body>
</html>
